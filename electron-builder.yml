appId: com.viaggiorni.app
productName: Viaggiorni
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.web.tsbuildinfo}'
  - '!{components.json,NPM_README.md,PROJECT_SPECIFICATIONS.md,vitest.config.ts,vitest.setup.ts,drizzle.config.ts}'
  - '!raw_images/**'
  - '!data/**'
  - '!memory/**'
  - '!.claude/**'
  - '!.VSCodeCounter/**'
  - '!squashfs-root/**'
asarUnpack:
  - resources/**
extraResources:
  - from: ./drizzle
    to: drizzle
win:
  executableName: viaggiorni
  target:
    - msi
msi:
  artifactName: ${name}-${version}.${ext}
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: Giovanni Stagnaro
  category: Utility
  desktop:
    entry:
      StartupWMClass: viaggiorni
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
